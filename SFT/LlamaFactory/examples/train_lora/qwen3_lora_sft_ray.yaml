### model
model_name_or_path: /data1/tanhaozhen/~/qwen/Qwen2___5-VL-3B-Instruct  # or use local absolute path
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: aq_proj/v_proj

### dataset
dataset: custom_gui_dataset
dataset_dir: /data1/tanhaozhen/gui-r1/GUI-R1/train.parquet # or use local absolute path
template: qwen
cutoff_len: 2048
max_samples: 3000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /data1/tanhaozhen/~
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### ray
ray_run_name: qwen3_4b_sft_lora
ray_storage_path: ./saves
ray_num_workers: 4  # Number of GPUs to use.
placement_strategy: PACK
resources_per_worker:
  GPU: 1
# ray_init_kwargs:
#   runtime_env:
#     env_vars:
#       <YOUR-ENV-VAR-HERE>: "<YOUR-ENV-VAR-HERE>"
#     pip:
#       - emoji

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

